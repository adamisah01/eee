<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - WasteWise</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            padding: 2rem; 
            background: #f9fafb; 
            color: #1f2937; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.8; }
        h1 { margin-bottom: 0.5rem; font-size: 1.5rem; }
        p { color: #6b7280; margin-bottom: 2rem; max-width: 300px; line-height: 1.5; }
        button { 
            background: #16a34a; 
            color: white; 
            border: none; 
            padding: 0.875rem 2rem; 
            border-radius: 0.5rem; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: background 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        button:active { background: #15803d; transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It seems you've lost your internet connection. WasteWise needs an active connection to function.</p>
    <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
