<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WasteWise</title>
    <meta name="description" content="On-demand waste collection platform">
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#16a34a">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192x192.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/animations.css">
    
    <!-- Page Specific Styles -->
    <link rel="stylesheet" href="/css/pages/home.css">
    <link rel="stylesheet" href="/css/pages/order.css">
    <link rel="stylesheet" href="/css/pages/track.css">
    <link rel="stylesheet" href="/css/pages/payment.css">
    <link rel="stylesheet" href="/css/pages/collector.css">
    <link rel="stylesheet" href="/css/pages/auth.css">
</head>
<body>
    <!-- Global Notifications -->
    <div id="toast-container"></div>

    <!-- Offline Banner -->
    <div id="offline-banner" class="hidden">
        You are currently offline. Some features may be unavailable.
    </div>

    <!-- Main SPA Container -->
    <main id="app" class="app-container">
        <!-- Content gets injected here by router -->
        <div class="initial-loader">
            <div class="spinner"></div>
        </div>
    </main>
    
    <!-- Scripts -->
    <script type="module" src="/js/app.js"></script>
</body>
</html>
