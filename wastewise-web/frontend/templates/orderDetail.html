<div class="page" style="padding-bottom:100px;">
  <div class="header">
    <div style="font-size:1.5rem;cursor:pointer;" onclick="history.back()">←</div>
    <h2 class="font-bold text-lg">Order Details</h2>
    <div style="width:24px;"></div>
  </div>

  <div class="mt-4 card">
    <div class="flex justify-between items-center mb-4">
      <span class="font-bold text-lg">WW12345678</span>
      <span class="badge badge-success">Completed</span>
    </div>
    <p class="text-sm text-muted">Placed on Jun 14, 2026</p>
    <hr style="border:none;border-top:1px dashed var(--color-border);margin:1rem 0;">
    <div class="flex justify-between items-center mb-2">
      <span class="text-muted text-sm">Service</span>
      <span class="font-bold text-sm">General Waste</span>
    </div>
    <div class="flex justify-between items-center">
      <span class="text-muted text-sm">Total Paid</span>
      <span class="font-bold text-sm" style="color:var(--color-primary);">₦765</span>
    </div>
  </div>

  <div class="mt-6">
    <h3 class="font-bold mb-4">Timeline</h3>
    <div style="position:relative; padding-left:20px; border-left:2px solid var(--color-primary); margin-left:10px;">
      <div style="position:relative; margin-bottom:1.5rem;">
        <div style="position:absolute; left:-27px; top:0; width:12px; height:12px; border-radius:50%; background:var(--color-primary);"></div>
        <p class="font-bold text-sm">Completed</p>
        <p class="text-xs text-muted">10:45 AM</p>
      </div>
      <div style="position:relative; margin-bottom:1.5rem;">
        <div style="position:absolute; left:-27px; top:0; width:12px; height:12px; border-radius:50%; background:var(--color-primary);"></div>
        <p class="font-bold text-sm">Collector Arrived</p>
        <p class="text-xs text-muted">10:20 AM</p>
      </div>
      <div style="position:relative;">
        <div style="position:absolute; left:-27px; top:0; width:12px; height:12px; border-radius:50%; background:var(--color-primary);"></div>
        <p class="font-bold text-sm">Order Placed</p>
        <p class="text-xs text-muted">9:30 AM</p>
      </div>
    </div>
  </div>

  <div class="mt-8 card" style="text-align:center;">
    <h3 class="font-bold mb-2">Rate Emeka</h3>
    <div style="font-size:2rem;color:var(--color-warning);margin-bottom:1rem;cursor:pointer;">
      ★ ★ ★ ★ ☆
    </div>
    <button class="btn btn-outline w-full" onclick="window.showToast('Thanks for your feedback!', 'success')">Submit Rating</button>
  </div>
</div>
