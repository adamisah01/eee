<div class="page items-center justify-center" style="min-height:100vh;">
  <div class="card w-full" style="max-width: 360px; text-align: center; border: none; box-shadow: none; background: transparent;">
    <div class="mb-6 flex justify-center" style="margin-bottom:1.5rem; display:flex; justify-content:center;">
      <div style="width:80px;height:80px;background:linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:40px;box-shadow: 0 10px 25px rgba(22, 163, 74, 0.3);">🌱</div>
    </div>
    <h1 class="font-bold text-2xl mb-2" style="font-weight:700;font-size:1.5rem;margin-bottom:0.5rem;letter-spacing:-0.025em;">Welcome to WasteWise</h1>
    <p class="text-muted mb-6" style="color:var(--color-text-muted);margin-bottom:2rem;">Enter your phone number to continue</p>
    
    <form id="login-form">
      <div class="input-group text-left" style="text-align:left;">
        <label class="input-label" for="phone" style="font-size:0.875rem;font-weight:500;margin-bottom:0.25rem;display:block;">Phone Number</label>
        <div class="flex items-center input-field" style="display:flex;align-items:center;padding:0;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);overflow:hidden;">
          <span style="padding: 14px; color: var(--color-text-muted); border-right: 1px solid var(--color-border); background:#f3f4f6; font-weight:500;">+234</span>
          <input type="tel" id="phone" name="phone" class="flex-1" style="flex:1;border:none;padding:14px;background:transparent;outline:none;font-size:1rem;" placeholder="803 000 0000" required pattern="[0-9]{10,11}">
        </div>
      </div>
      
      <button type="submit" id="login-btn" class="btn btn-primary mt-4" style="margin-top:1.5rem;padding:14px;">
        Get OTP
      </button>
    </form>
  </div>
</div>
