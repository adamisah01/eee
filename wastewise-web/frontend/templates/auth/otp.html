<div class="page items-center justify-center" style="min-height:100vh;">
  <div class="card w-full" style="max-width: 360px; text-align: center; border: none; box-shadow: none; background: transparent;">
    <div class="mb-6 flex justify-center" style="margin-bottom:1.5rem; display:flex; justify-content:center;">
      <div style="width:80px;height:80px;background:var(--color-primary-light);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--color-primary-dark);font-size:40px;">📱</div>
    </div>
    <h1 class="font-bold text-2xl mb-2" style="font-weight:700;font-size:1.5rem;margin-bottom:0.5rem;letter-spacing:-0.025em;">Verify Phone</h1>
    <p class="text-muted mb-6" style="color:var(--color-text-muted);margin-bottom:2rem;line-height:1.5;">Enter the 6-digit code sent to <br><strong id="otp-phone-display" style="color:var(--color-text-main);">your phone</strong></p>
    
    <div class="otp-inputs" id="otp-container" style="display:flex;gap:0.5rem;justify-content:center;margin-bottom:1.5rem;">
      <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" autofocus style="width:45px;height:55px;text-align:center;font-size:1.5rem;font-weight:700;border:2px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface);transition:all 0.2s;">
      <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" style="width:45px;height:55px;text-align:center;font-size:1.5rem;font-weight:700;border:2px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface);transition:all 0.2s;">
      <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" style="width:45px;height:55px;text-align:center;font-size:1.5rem;font-weight:700;border:2px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface);transition:all 0.2s;">
      <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" style="width:45px;height:55px;text-align:center;font-size:1.5rem;font-weight:700;border:2px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface);transition:all 0.2s;">
      <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" style="width:45px;height:55px;text-align:center;font-size:1.5rem;font-weight:700;border:2px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface);transition:all 0.2s;">
      <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" style="width:45px;height:55px;text-align:center;font-size:1.5rem;font-weight:700;border:2px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface);transition:all 0.2s;">
    </div>
    
    <button id="verify-btn" class="btn btn-primary mt-4" disabled style="padding:14px;">
      Verify
    </button>

    <div class="mt-6 text-sm text-muted" style="margin-top:2rem;font-size:0.875rem;color:var(--color-text-muted);">
      Didn't receive code? <button id="resend-btn" class="font-bold text-primary" style="color:var(--color-primary);text-decoration:none;font-weight:600;background:none;border:none;padding:0;cursor:pointer;">Resend</button>
    </div>
  </div>
</div>
