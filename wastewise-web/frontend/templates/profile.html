<div class="page" style="padding-bottom:100px;">
  <div class="header">
    <h2 class="font-bold text-lg">My Profile</h2>
    <div style="width:24px;"></div>
  </div>

  <div class="mt-4 flex items-center gap-4">
    <div style="width:64px;height:64px;background:var(--color-primary-light);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--color-primary-dark);font-size:32px;">👤</div>
    <div>
      <h3 class="font-bold text-xl" id="profile-name">Amaka</h3>
      <p class="text-muted">+234 803 123 4567</p>
    </div>
  </div>

  <div class="mt-8 flex-col gap-3">
    <div class="flex justify-between items-center px-4 py-3 bg-surface border rounded-lg card card-interactive" style="cursor:pointer;border:1px solid var(--color-border);border-radius:var(--radius-md);">
      <span class="font-bold">Edit Profile</span>
      <span class="text-muted">→</span>
    </div>
    <div class="flex justify-between items-center px-4 py-3 bg-surface border rounded-lg card card-interactive" style="cursor:pointer;border:1px solid var(--color-border);border-radius:var(--radius-md);">
      <span class="font-bold">Saved Addresses</span>
      <span class="text-muted">→</span>
    </div>
    <div class="flex justify-between items-center px-4 py-3 bg-surface border rounded-lg card card-interactive" style="cursor:pointer;border:1px solid var(--color-border);border-radius:var(--radius-md);">
      <span class="font-bold">Notification Preferences</span>
      <span class="text-muted">→</span>
    </div>
  </div>

  <div class="mt-8">
    <button class="btn btn-outline w-full" style="color:var(--color-error);border-color:var(--color-error);" onclick="import('/js/state.js').then(m => m.state.setUser(null, null)); window.location.hash='#/login';">Log Out</button>
  </div>

  <!-- Bottom Navigation -->
  <div style="position:fixed;bottom:0;left:0;right:0;background:var(--color-surface);display:flex;justify-content:space-around;padding:0.75rem 0 1.5rem 0;box-shadow:0 -4px 15px rgba(0,0,0,0.05);z-index:20;border-top-left-radius:1.5rem;border-top-right-radius:1.5rem;" class="bottom-nav max-w-[480px] mx-auto">
    <div style="display:flex;flex-direction:column;align-items:center;color:var(--color-text-muted);font-weight:600;font-size:0.75rem;cursor:pointer;" onclick="window.location.hash='#/'">
      <span style="font-size:1.5rem;margin-bottom:2px;">🏠</span> Home
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;color:var(--color-text-muted);font-weight:600;font-size:0.75rem;cursor:pointer;" onclick="window.location.hash='#/orders'">
      <span style="font-size:1.5rem;margin-bottom:2px;">📜</span> Orders
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;color:var(--color-primary);font-weight:600;font-size:0.75rem;cursor:pointer;">
      <span style="font-size:1.5rem;margin-bottom:2px;">👤</span> Profile
    </div>
  </div>
</div>
